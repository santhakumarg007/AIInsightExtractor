<!-- Tret AI Global Widget -->
<div id="tret-ai-container" class="fixed bottom-6 right-6 z-50 font-inter">
    
    <!-- Widget Button (Diamond Shape) -->
    <div id="tret-btn" class="relative group cursor-pointer group-hover:drop-shadow-2xl">
        <div class="absolute -inset-1 bg-gradient-to-r from-teal-400 to-emerald-500 rounded-2xl blur opacity-70 group-hover:opacity-100 transition duration-1000 group-hover:duration-200 animate-[shinyPulse_2s_infinite] rotate-45 group-hover:scale-110"></div>
        <div class="tret-ai-widget relative bg-gradient-to-br from-emerald-600 to-cyan-700 text-white rounded-2xl h-16 w-16 flex items-center justify-center shadow-2xl border-2 border-white/40 transform transition-transform group-hover:scale-110 active:scale-95 rotate-45">
            <div class="-rotate-45 flex items-center justify-center">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                   <!-- Bot Icon representing Tret AI -->
                   <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
        </div>
        <!-- Tooltip (Adjusted leftwards since widget is on the right) -->
        <div class="absolute right-24 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none" id="tret-tooltip">
            <div class="bg-white text-emerald-900 text-sm font-bold px-4 py-2 rounded-xl shadow-xl whitespace-nowrap border border-emerald-100">
                Hi! I'm Tret AI 👋
            </div>
        </div>
    </div>

    <!-- Collapsible Chat Window -->
    <div id="tret-chat-window" class="absolute bottom-24 right-0 w-80 sm:w-96 bg-white/90 glass-panel border border-emerald-100 rounded-2xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 origin-bottom-right scale-0 opacity-0 h-[500px] pointer-events-none">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-emerald-600 to-cyan-700 p-4 text-white flex justify-between items-center shadow-md z-10">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-full">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </div>
                <div>
                    <h3 class="font-bold text-md leading-tight">Tret AI</h3>
                    <p class="text-[0.65rem] text-emerald-100 font-medium">Insights Assistant</p>
                </div>
            </div>
            <button id="tret-close-btn" class="text-white hover:text-emerald-200 hover:bg-white/10 p-1.5 rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <!-- Chat History -->
        <div id="tret-chat-history" class="flex-grow p-4 overflow-y-auto space-y-4 bg-gray-50/50 custom-scrollbar">
            <div class="flex justify-start animate-fade-in-up">
                <div class="max-w-[85%] rounded-2xl rounded-tl-sm px-4 py-3 text-sm bg-white border border-gray-100 text-gray-800 shadow-sm leading-relaxed">
                    Hello! I'm <b>Tret AI</b>, your friendly assistant. Need help understanding Insight Extractor or how to use the web app? Just ask or use your voice!
                </div>
            </div>
        </div>
        
        <div id="tret-loader" class="hidden absolute bottom-20 left-6 text-xs text-emerald-600 font-medium items-center gap-2 bg-white/80 px-3 py-1.5 rounded-full shadow-sm backdrop-blur-md">
            <div class="spinner !border-t-emerald-500 !w-3 !h-3 border-2"></div> Tret AI is typing...
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-white border-t border-gray-100 relative z-10">
            <form id="tret-form" class="flex items-center gap-2">
                <input type="text" id="tret-input" required class="flex-grow px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all outline-none text-sm" placeholder="Ask Tret AI...">
                
                <!-- Voice Mic Button -->
                <button type="button" id="tret-voice-btn" class="p-2.5 bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-emerald-600 rounded-xl transition-colors relative group" title="Use Voice Command">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                    <!-- Pulse effect when recording -->
                    <span id="tret-voice-pulse" class="absolute -inset-1 bg-red-400 rounded-xl animate-ping opacity-0"></span>
                </button>

                <button type="submit" class="p-2.5 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white rounded-xl shadow-md transition-all duration-200">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </form>
        </div>
    </div>
</div>

<style>
@keyframes shinyPulse {
    0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
    50% { box-shadow: 0 0 20px 15px rgba(16, 185, 129, 0); }
    100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}
</style>
