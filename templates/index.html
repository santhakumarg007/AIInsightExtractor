<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Extractor - AI Summarizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="slide-in-left bg-gradient-to-br from-fuchsia-50 via-sky-50 to-emerald-50 min-h-screen flex flex-col relative">

    <!-- Navigation -->
    {% include 'navbar.html' %}

    <!-- Hero Section -->
    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl w-full space-y-12">
            
            <div class="text-center space-y-4 animate-fade-in-up">
                <h1 class="text-5xl md:text-6xl font-extrabold text-gray-900 tracking-tight">
                    Extract Insights in <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-cyan-600">Seconds</span>
                </h1>
                <p class="text-xl text-gray-600 max-w-2xl mx-auto">
                    Transform long PDFs and Word documents into bite-sized summaries, structured insights, and interactive MCQs using advanced AI.
                </p>
            </div>

            <!-- Auth Panel -->
            <div class="max-w-md mx-auto bg-white/80 backdrop-blur-xl rounded-2xl shadow-2xl shadow-purple-200/50 overflow-hidden border border-white/40 transform transition-all hover:scale-[1.01] duration-300 relative z-10">
                
                <div class="px-8 pt-8 pb-4 border-b border-gray-100 flex justify-between relative">
                    <button id="tab-login" class="text-lg font-bold text-emerald-600 pb-2 flex-1 text-center transition-colors">Log In</button>
                    <button id="tab-register" class="text-lg font-medium text-gray-400 pb-2 flex-1 text-center hover:text-gray-600 transition-colors">Register</button>
                    <!-- Active Indicator -->
                    <div id="tab-indicator" class="absolute bottom-0 left-0 w-1/2 h-0.5 bg-emerald-600 transition-transform duration-300"></div>
                </div>

                <div class="p-8">
                    <!-- Login Form -->
                    <form id="login-form" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email Address</label>
                            <input type="email" id="login-email" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="you@example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Password</label>
                            <input type="password" id="login-password" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="••••••••">
                        </div>
                        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-700 hover:to-cyan-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transform transition-all hover:-translate-y-0.5">
                            Sign In
                        </button>
                        <div id="login-error" class="text-red-500 text-sm text-center hidden"></div>
                    </form>

                    <!-- Register Form -->
                    <form id="register-form" class="space-y-6 hidden">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email Address</label>
                            <input type="email" id="register-email" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="you@example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Password</label>
                            <input type="password" id="register-password" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none" placeholder="••••••••">
                        </div>
                        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transform transition-all hover:-translate-y-0.5">
                            Create Account
                        </button>
                        <div id="register-error" class="text-red-500 text-sm text-center hidden"></div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-white/50 border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-gray-500">&copy; 2026 InsightExtractor. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% include 'tret_widget.html' %}
</body>
</html>
