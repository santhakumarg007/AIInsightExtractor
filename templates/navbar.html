<!-- Global Logout Interceptor -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const cookies = document.cookie;
        // In Flask, session isn't easily readable from JS directly unless we look for a cookie named 'session'
        // If they are on a secured route, or if dashboard elements exist, show logout!
        // An easier heuristic for this template architecture is looking for 'session' cookie.
        if (cookies.includes('session=')) {
            document.getElementById('nav-logout-btn').classList.remove('hidden');
        }

        const btn = document.getElementById("nav-logout-btn");
        if (btn) btn.addEventListener("click", async () => {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/";
        });
    });
</script>
